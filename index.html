<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>휴게실</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

  .select-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
    text-decoration: none;
  }
  .select-btn:active { opacity: 0.85; }

  .btn-alt {
    background: #1a3a5c;
    color: white;
  }
  .btn-daedae {
    background: #2c6e49;
    color: white;
  }

  .btn-title {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .btn-sub {
    font-size: 15px;
    opacity: 0.7;
  }

  .divider {
    height: 3px;
    background: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>

<a class="select-btn btn-alt" href="alt.html">
  <div class="btn-title">ALT</div>
  <div class="btn-sub">알라트 휴게실</div>
</a>

<div class="divider"></div>

<a class="select-btn btn-daedae" href="daedae.html">
  <div class="btn-title">대대휴게실</div>
  <div class="btn-sub">대대 휴게실</div>
</a>

</body>
</html>
